name: DB Backup

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  backup:
    name: 🗄️ PostgreSQL Backup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q postgresql-client

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_DIR: ./backups
          RETENTION_DAYS: '0'   # Don't prune locally — artifact TTL controls retention
        run: bash scripts/backup-db.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: backups/*.sql.gz
          retention-days: 30

      - name: Summary
        run: |
          FILENAME=$(ls backups/*.sql.gz | head -1)
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "## DB Backup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | $(basename $FILENAME) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Retention | 30 days (GitHub artifact) |" >> "$GITHUB_STEP_SUMMARY"
