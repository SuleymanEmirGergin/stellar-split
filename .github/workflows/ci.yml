name: StellarSplit CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Contract Tests ──
  contract-test:
    name: 🧪 Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose
        working-directory: .

      - name: Clippy (stellar_split contract)
        run: cargo clippy --package stellar-split -- -D warnings
        working-directory: .

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: .

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ── Contract Deploy (testnet, master only) ──
  contract-deploy:
    name: 🚀 Deploy Contracts → Testnet
    runs-on: ubuntu-latest
    needs: [contract-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: wasm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (for stellar-cli install)
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-stellar-cli-v22

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --version "^22" 2>/dev/null || cargo install stellar-cli --version "^22"

      - name: Configure Stellar network and key
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
          STELLAR_NETWORK: ${{ secrets.STELLAR_NETWORK }}
        run: |
          stellar network add --global "${STELLAR_NETWORK}" \
            --rpc-url "https://soroban-testnet.stellar.org" \
            --network-passphrase "Test SDF Network ; September 2015"
          stellar keys generate --global deployer \
            --secret-key \
            --network "${STELLAR_NETWORK}" <<< "${STELLAR_SECRET_KEY}" || \
          stellar keys add deployer --secret-key "${STELLAR_SECRET_KEY}"

      - name: Deploy stellar_split contract
        id: deploy_split
        env:
          STELLAR_NETWORK: ${{ secrets.STELLAR_NETWORK }}
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm wasm/stellar_split.wasm \
            --source deployer \
            --network "${STELLAR_NETWORK}" \
            --ignore-checks 2>&1 | grep -E '^[A-Z0-9]{56}$' | tail -1)
          if [ -z "$CONTRACT_ID" ]; then
            echo "ERROR: Failed to parse contract ID from deploy output" >&2
            exit 1
          fi
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "stellar_split deployed: $CONTRACT_ID"

      - name: Deploy stellar_split_token contract
        id: deploy_token
        env:
          STELLAR_NETWORK: ${{ secrets.STELLAR_NETWORK }}
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm wasm/stellar_split_token.wasm \
            --source deployer \
            --network "${STELLAR_NETWORK}" \
            --ignore-checks 2>&1 | grep -E '^[A-Z0-9]{56}$' | tail -1)
          if [ -z "$CONTRACT_ID" ]; then
            echo "ERROR: Failed to parse contract ID from deploy output" >&2
            exit 1
          fi
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "stellar_split_token deployed: $CONTRACT_ID"

      - name: Summary
        run: |
          echo "## Contract Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract | ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| stellar_split | ${{ steps.deploy_split.outputs.contract_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| stellar_split_token | ${{ steps.deploy_token.outputs.contract_id }} |" >> "$GITHUB_STEP_SUMMARY"

  # ── Frontend Build ──
  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── E2E (Playwright) ──
  e2e:
    name: 🌐 E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ── Lint ──
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Backend API Tests ──
  backend-test:
    name: Backend API Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stellarsplit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stellarsplit_test

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stellarsplit_test

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov -- --runInBand
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stellarsplit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_REFRESH_TTL: "604800"
          NODE_ENV: test

      - name: E2E tests
        run: npm run test:e2e -- --runInBand
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stellarsplit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          JWT_REFRESH_TTL: "604800"
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == 20
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # ── Backend build (Railway deploy validation) ──
  backend-build:
    name: Backend Build (Railway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: NestJS build
        run: npm run build

  # ── Railway Deploy — Staging (develop branch) ──
  deploy-staging:
    name: Deploy Backend → Railway Staging
    runs-on: ubuntu-latest
    needs: [backend-test, backend-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger Railway staging redeploy
        run: railway redeploy --service ${{ vars.RAILWAY_STAGING_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Railway Deploy — Production (master branch) ──
  deploy-railway:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [backend-test, backend-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Trigger Railway redeploy
        run: railway redeploy --service ${{ vars.RAILWAY_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Security audit ──
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=critical --omit=dev
