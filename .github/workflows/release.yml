# Optional: create a GitHub Release when a version tag (v*.*.*) is pushed.
# Requires: push permission for GITHUB_TOKEN (default in repo).
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_CONTRACT_ID: ""

      - name: Zip frontend dist
        run: |
          cd frontend
          zip -r ../frontend-dist.zip dist

      - name: Extract release notes from CHANGELOG
        run: |
          VER="${GITHUB_REF#refs/tags/}"
          sed -n "/## \[${VER#v}\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: release_notes.md
          files: frontend-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
