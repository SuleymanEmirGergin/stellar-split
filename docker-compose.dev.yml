# ─── Local development infrastructure ───────────────────────────────────────
# Starts only PostgreSQL + Redis so you can run the API natively with:
#   cd backend && npm run start:dev
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d          # start infra
#   docker compose -f docker-compose.dev.yml down -v        # stop + wipe volumes
#   cd backend && npm run db:migrate:dev                     # apply migrations
#   cd backend && npm run db:seed                            # seed dev data

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellarsplit
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
